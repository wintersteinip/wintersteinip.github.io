<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>Album example · Bootstrap v5.3</title>

    <link rel="canonical" href="https://wintersteinip.github.io/templates/album/index.html" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <style>
      .album-card img{ height: 240px; object-fit: cover; }
    </style>
  </head>

  <body>

      <section class="py-5 text-center container">
        <div class="row py-lg-4">
          <div class="col-lg-6 col-md-8 mx-auto">
            <h1 class="fw-light">Album</h1>
            <p class="lead text-body-secondary">Something short and leading about the collection below.</p>
          </div>
        </div>
      </section>

      <div class="album py-5 bg-body-tertiary">
        <div class="container">
          <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3" id="albumGrid"></div>
        </div>
      </div>
    </main>

    <script>
      // Exactly 56 cards/images

        "assets/img/OIP-1709340830_TqxG.jpg",

        "assets/img/OIP-1642400108_TqxG.jpg",
        "assets/img/OIP-1656437552_TqxG.jpg"
      ];

      const grid = document.getElementById("albumGrid");

      if (images.length !== 56) {
        console.error("Expected 56 images, got:", images.length);
      }

      images.forEach((src, i) => {
        const card = document.createElement("div");
        card.className = "col album-card";

        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${src}" class="bd-placeholder-img card-img-top" alt="Album image ${i + 1}">
            <div class="card-body">
              <p class="card-text">Album ${i + 1}</p>
              <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-outline-secondary">View</button>
                  <button type="button" class="btn btn-sm btn-outline-secondary">Edit</button>
                </div>
                <small class="text-body-secondary">9 mins</small>
              </div>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
